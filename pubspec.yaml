name: ranahinsight_mobile
description: Aplikasi mobile RANAHINSIGHT untuk eksplorasi destinasi wisata Sumatera Barat.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  fl_chart: ^0.69.0
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  lucide_icons_flutter: ^1.2.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
